<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;touch-action:none;font-family:'Courier New',Courier,monospace;user-select:none;-webkit-user-select:none}canvas{display:block;width:100vw;height:100vh}#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;pointer-events:none;z-index:10}.stat{display:flex;flex-direction:column;align-items:center}.stat-label{font-size:9px;letter-spacing:3px;color:#ff2d78;text-shadow:0 0 10px #ff2d78;margin-bottom:2px}.stat-value{font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 15px #00f3ff}#lives-display{display:flex;gap:6px;align-items:center;margin-top:4px}.heart{width:20px;height:20px;background:#ff2d78;-webkit-clip-path:path('M10 18S1 12 1 6A4.5 4.5 0 0 1 10 2.8 4.5 4.5 0 0 1 19 6C19 12 10 18 10 18Z');clip-path:path('M10 18S1 12 1 6A4.5 4.5 0 0 1 10 2.8 4.5 4.5 0 0 1 19 6C19 12 10 18 10 18Z');display:inline-block;flex-shrink:0}.heart.lost{background:rgba(255,45,120,0.15);-webkit-clip-path:none;clip-path:none;border:1px solid rgba(255,45,120,0.3);border-radius:2px}#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:radial-gradient(ellipse at center,rgba(0,10,30,0.95) 0%,rgba(0,0,0,0.98) 100%)}#overlay h1{font-size:48px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 20px #00f3ff,0 0 50px #00f3ff;margin-bottom:6px}#overlay .sub{font-size:11px;letter-spacing:4px;color:#ff2d78;text-shadow:0 0 15px #ff2d78;margin-bottom:40px}#overlay .info{font-size:14px;color:#00f3ff;letter-spacing:3px;margin-bottom:8px;text-shadow:0 0 10px #00f3ff;display:none}#overlay .hiscore{font-size:12px;color:#ffdd00;letter-spacing:3px;margin-bottom:28px;text-shadow:0 0 10px #ffdd00;display:none}#start-btn{background:transparent;border:2px solid #00f3ff;color:#00f3ff;font-family:'Courier New',Courier,monospace;font-size:14px;font-weight:700;letter-spacing:4px;padding:14px 36px;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 0 20px #00f3ff}#hint{margin-top:14px;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.3)}#combo{position:fixed;top:76px;left:50%;transform:translateX(-50%);font-size:12px;letter-spacing:3px;color:#ffdd00;text-shadow:0 0 12px #ffdd00;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.3s}#combo.show{opacity:1}#lvlflash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:15;opacity:0}#lvlflash span{font-size:44px;font-weight:900;letter-spacing:5px;color:#fff;text-shadow:0 0 30px #ff2d78}#shop{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px;overflow-y:auto;z-index:25;background:radial-gradient(ellipse at center,rgba(0,5,20,0.98) 0%,rgba(0,0,0,1) 100%)}#shop.active{display:flex}#shop-title{font-size:28px;font-weight:900;letter-spacing:4px;color:#ffdd00;text-shadow:0 0 20px #ffdd00;margin-bottom:4px;margin-top:8px;white-space:nowrap;text-align:center;width:100%}#shop-sub{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.35);margin-bottom:6px}#shop-pts{font-size:14px;color:#00f3ff;letter-spacing:3px;text-shadow:0 0 10px #00f3ff;margin-bottom:14px}#shop-tabs{display:flex;gap:8px;margin-bottom:14px}.stab{background:transparent;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.4);font-family:'Courier New',Courier,monospace;font-size:10px;letter-spacing:2px;padding:7px 18px;cursor:pointer;-webkit-tap-highlight-color:transparent}.stab.on{border-color:#ffdd00;color:#ffdd00;box-shadow:0 0 8px rgba(255,221,0,0.3)}#shop-list{display:flex;flex-direction:column;gap:9px;width:100%;max-width:360px}.sitem{display:flex;align-items:center;gap:10px;border:1.5px solid rgba(255,255,255,0.1);padding:10px 12px;background:rgba(255,255,255,0.03)}.sitem.ok{border-color:rgba(0,243,255,0.4)}.sitem.okup{border-color:rgba(255,170,0,0.4)}.sicon{font-size:20px;flex-shrink:0}.sinfo{flex:1}.sname{font-size:11px;font-weight:700;letter-spacing:2px;color:#fff;margin-bottom:2px}.sdesc{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,0.38)}.slvl{font-size:8px;letter-spacing:1px;color:#ffaa00;margin-top:2px}.sbtn{background:transparent;font-family:'Courier New',Courier,monospace;font-weight:700;font-size:9px;letter-spacing:2px;padding:7px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}.sbtn.buy{border:1.5px solid #ffdd00;color:#ffdd00}.sbtn.ubuy{border:1.5px solid #ffaa00;color:#ffaa00}.sbtn.no{border:1.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.18);pointer-events:none}#shop-cont{margin-top:18px;margin-bottom:24px;background:transparent;border:2px solid #00f3ff;color:#00f3ff;font-family:'Courier New',Courier,monospace;font-size:12px;font-weight:700;letter-spacing:4px;padding:12px 32px;cursor:pointer;box-shadow:0 0 16px #00f3ff;-webkit-tap-highlight-color:transparent}</style>

<body>
<canvas id="c"></canvas>

<div id="ui">

<script>var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
var state = 'menu';
var score = 0, hiScore = 0, lives = 3, level = 1;
var combo = 0, comboTimer = 0;
var frameCount = 0;
var asteroidSpawnRate = 90;
var asteroidSpeedMult = 1;
var asteroidHpBonus = 0;
var MAX_ASTEROIDS = 15;
var MAX_ENEMIES = 8;
var upgrades = { maxLives:0, orbLevel:0 };
var upgradesBought = 0;
function upgradeCost() {
return Math.round(10000 * Math.pow(1.35, upgradesBought) / 1000) * 1000;
}
function maxLivesCap() { return 3 + upgrades.maxLives; }
var ORB_CONFIG = [
null,
{ count:2, radius:62, speed:0.032, respawn:90 },
{ count:3, radius:70, speed:0.040, respawn:75 },
{ count:4, radius:78, speed:0.048, respawn:60 }
];
var player = {
x:0, y:0, r:18, vx:0, vy:0,
angle: -Math.PI/2,
trail: [],
shootCd: 0,
sideCd: 0,
invincible: 0,
orbAngle: 0,
orbs: []
};
function bulletSpeed() { return 18; }
function fireCooldown() { return 9; }
var bullets = [], asteroids = [], particles = [], stars = [];
var powerups = [], enemies = [];
var rapidFire = false, rapidTimer = 0;
var tripleShot = false, tripleShotTimer = 0;
var boss = null, bossActive = false, bossShake = 0, bossAnnounceTimer = 0;
var inventory = [];
var shopTab = 'items';
var stick = { active:false, id:null, baseX:0, baseY:0, dx:0, dy:0 };
var STICK_R = 55, STICK_DEAD = 8;
var AIM_CONE = Math.PI / 4;
canvas.addEventListener('touchstart', function(e) {
e.preventDefault();
if (state !== 'playing') return;
var t = e.changedTouches[0];
if (!stick.active) {
stick.active = true; stick.id = t.identifier;
stick.baseX = t.clientX; stick.baseY = t.clientY;
stick.dx = 0; stick.dy = 0;
}
}, {passive:false});
canvas.addEventListener('touchmove', function(e) {
e.preventDefault();
if (state !== 'playing') return;
for (var i = 0; i < e.changedTouches.length; i++) {
var t = e.changedTouches[i];
if (t.identifier === stick.id) {
var dx = t.clientX - stick.baseX;
var dy = t.clientY - stick.baseY;
var d = Math.sqrt(dx*dx + dy*dy);
if (d > STICK_R) { dx = dx/d*STICK_R; dy = dy/d*STICK_R; }
stick.dx = dx; stick.dy = dy;
}
}
}, {passive:false});
canvas.addEventListener('touchend', function(e) {
e.preventDefault();
for (var i = 0; i < e.changedTouches.length; i++) {
var t = e.changedTouches[i];
if (t.identifier === stick.id) {
stick.active = false; stick.id = null; stick.dx = 0; stick.dy = 0;
}
if (state === 'playing') {
var slotY = H - 62, slotH = 52;
if (t.clientY >= slotY && t.clientY <= slotY + slotH) {
var idx = Math.floor((t.clientX - 12) / 52);
if (idx >= 0 && idx < inventory.length) useItem(idx);
}
}
}
}, {passive:false});
canvas.addEventListener('touchcancel', function(e) {
e.preventDefault();
stick.active = false; stick.id = null; stick.dx = 0; stick.dy = 0;
}, {passive:false});
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-btn').addEventListener('touchend', function(e){ e.preventDefault(); startGame(); });
document.getElementById('shop-cont').addEventListener('click', closeShop);
document.getElementById('shop-cont').addEventListener('touchend', function(e){ e.preventDefault(); closeShop(); });
document.getElementById('tab-items').addEventListener('click', function(){ setTab('items'); });
document.getElementById('tab-items').addEventListener('touchend', function(e){ e.preventDefault(); setTab('items'); });
document.getElementById('tab-upgrades').addEventListener('click', function(){ setTab('upgrades'); });
document.getElementById('tab-upgrades').addEventListener('touchend', function(e){ e.preventDefault(); setTab('upgrades'); });
function dist(a, b) {
var dx = a.x - b.x, dy = a.y - b.y;
return Math.sqrt(dx*dx + dy*dy);
}
function angleDiff(a, b) {
var d = (b - a) % (Math.PI * 2);
if (d > Math.PI) d -= Math.PI * 2;
if (d < -Math.PI) d += Math.PI * 2;
return Math.abs(d);
}
function nearestTarget() {
var best = null, bd = Infinity;
var i, d, ang;
for (i = 0; i < asteroids.length; i++) {
d = dist(player, asteroids[i]);
ang = Math.atan2(asteroids[i].y - player.y, asteroids[i].x - player.x);
if (angleDiff(player.angle, ang) <= AIM_CONE && d < bd) { bd = d; best = asteroids[i]; }
}
for (i = 0; i < enemies.length; i++) {
d = dist(player, enemies[i]);
ang = Math.atan2(enemies[i].y - player.y, enemies[i].x - player.x);
if (angleDiff(player.angle, ang) <= AIM_CONE && d < bd) { bd = d; best = enemies[i]; }
}
if (boss) {
var borb = boss.r * 1.7;
var allAlive = true;
for (var di = 0; di < boss.drones.length; di++) {
if (!boss.drones[di].alive) { allAlive = false; continue; }
var drX2 = boss.x + Math.cos(boss.drones[di].angle) * borb;
var drY2 = boss.y + Math.sin(boss.drones[di].angle) * borb;
d = dist(player, {x:drX2, y:drY2});
ang = Math.atan2(drY2 - player.y, drX2 - player.x);
if (angleDiff(player.angle, ang) <= AIM_CONE && d < bd) { bd = d; best = {x:drX2, y:drY2}; }
}
if (allAlive === false) {
d = dist(player, boss);
ang = Math.atan2(boss.y - player.y, boss.x - player.x);
if (angleDiff(player.angle, ang) <= AIM_CONE && d < bd) { best = boss; }
}
}
return best;
}
function edgeSpawn(margin) {
var edge = Math.floor(Math.random() * 4);
if (edge === 0) return { x: Math.random()*W, y: -margin };
if (edge === 1) return { x: W+margin, y: Math.random()*H };
if (edge === 2) return { x: Math.random()*W, y: H+margin };
return { x: -margin, y: Math.random()*H };
}
function makeAsteroidShape(sides) {
var w = [];
for (var i = 0; i < sides; i++) w.push(0.7 + Math.random()*0.6);
return w;
}
function shoot() {
if (player.shootCd > 0) return;
player.shootCd = rapidFire ? Math.max(3, fireCooldown()-3) : fireCooldown();
var angle = player.angle;
var t = nearestTarget();
if (t) angle = Math.atan2(t.y - player.y, t.x - player.x);
player.angle = angle;
var spd = bulletSpeed();
bullets.push({
x: player.x + Math.cos(angle)*player.r,
y: player.y + Math.sin(angle)*player.r,
vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, side: false
});
}
function shootSide() {
if (!tripleShot) return;
if (player.sideCd > 0) return;
player.sideCd = rapidFire ? Math.max(5, fireCooldown()*1.2|0) : fireCooldown()*1.8|0;
var spd = bulletSpeed() * 0.85;
var offsets = [-0.44, 0.44];
for (var i = 0; i < 2; i++) {
var a = player.angle + offsets[i];
bullets.push({
x: player.x + Math.cos(a)*player.r,
y: player.y + Math.sin(a)*player.r,
vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, side: true
});
}
}
function explode(x, y, color, count, spd) {
for (var i = 0; i < count; i++) {
var a = Math.random() * Math.PI * 2;
var s = spd * (0.3 + Math.random());
particles.push({ x:x, y:y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
life:1, decay:0.02+Math.random()*0.04, r:1+Math.random()*3, color:color });
}
}
function scoreText(x, y, txt) {
particles.push({ scoreText:txt, x:x, y:y, vy:-1.2, life:1, decay:0.025 });
}
function initStars() {
stars = [];
for (var i = 0; i < 160; i++) {
stars.push({
x: Math.random()*W, y: Math.random()*H,
r: Math.random()*1.4,
speed: 0.2 + Math.random()*0.5,
bright: 0.3 + Math.random()*0.7
});
}
}
function spawnAsteroid() {
if (asteroids.length >= MAX_ASTEROIDS) return;
var p = edgeSpawn(50);
var angle = Math.atan2(H/2 - p.y, W/2 - p.x) + (Math.random()-0.5)*1.2;
var giant = Math.random() < 0.2;
var r = giant ? 48+Math.random()*14 : 14+Math.random()*26;
var spd = (giant ? 0.3+Math.random()*0.5 : 0.8+Math.random()*1.4) * asteroidSpeedMult;
var sides = 6 + Math.floor(Math.random()*5);
var tier = giant ? 2 : (r > 22 ? 1 : 0);
var maxHp = 1 + asteroidHpBonus + (tier === 2 ? 1 : 0);
asteroids.push({
x:p.x, y:p.y, r:r, sides:sides, wobble:makeAsteroidShape(sides),
vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
rot:Math.random()*Math.PI*2, spin:(Math.random()-0.5)*(giant?0.02:0.04),
hue:Math.random()<0.3?280:(Math.random()<0.5?200:0),
tier:tier, hp:maxHp, maxHp:maxHp
});
}
function makeChildAsteroid(parent, r2, tier2) {
var ang = Math.random()*Math.PI*2;
var spd2 = (0.9+Math.random()*0.9)*asteroidSpeedMult;
var sides2 = 5 + Math.floor(Math.random()*4);
var maxHp = 1 + (tier2 > 0 ? Math.max(0, asteroidHpBonus-1) : 0);
return {
x:parent.x+Math.cos(ang)*parent.r*0.45, y:parent.y+Math.sin(ang)*parent.r*0.45,
r:r2, sides:sides2, wobble:makeAsteroidShape(sides2),
vx:Math.cos(ang)*spd2, vy:Math.sin(ang)*spd2,
rot:Math.random()*Math.PI*2, spin:(Math.random()-0.5)*0.05,
hue:parent.hue, tier:tier2, hp:maxHp, maxHp:maxHp
};
}
function spawnPowerup() {
var roll = Math.random();
var type = roll < 0.4 ? 'shield' : roll < 0.7 ? 'rapid' : 'triple';
powerups.push({ x:30+Math.random()*(W-60), y:-30, vy:0.8+Math.random()*0.6, type:type, r:14, t:0 });
}
function makeEnemy(x, y) {
return { x:x, y:y, r:22, vx:0, vy:0,
speed: 0.83 + Math.random()*0.45 + Math.min(level,6)*0.06,
angle:0, hp:3, flashTimer:0 };
}
var FORMATIONS = {
solo: [{dx:0,dy:0}],
triangle: [{dx:0,dy:0},{dx:-55,dy:55},{dx:55,dy:55}],
vshape: [{dx:0,dy:0},{dx:-50,dy:40},{dx:50,dy:40},{dx:-100,dy:80},{dx:100,dy:80}],
pincer: [{dx:0,dy:0},{dx:0,dy:60}]
};
function formationType() {
if (level >= 9) return Math.random() < 0.4 ? 'pincer' : 'vshape';
if (level >= 6) return Math.random() < 0.6 ? 'vshape' : 'triangle';
if (level >= 3) return 'triangle';
return 'solo';
}
function spawnFormation() {
if (enemies.length >= MAX_ENEMIES) return;
var type = formationType();
if (type === 'pincer') {
spawnFormationEdge('pincer', false);
spawnFormationEdge('pincer', true);
return;
}
spawnFormationEdge(type, false);
}
function spawnFormationEdge(type, opposite) {
var offsets = FORMATIONS[type];
var edge = Math.floor(Math.random()*4);
if (opposite) edge = (edge + 2) % 4;
var p = edgeSpawn(80);
if (edge === 0) { p.x = Math.random()*W; p.y = -80; }
else if (edge === 1) { p.x = W+80; p.y = Math.random()*H; }
else if (edge === 2) { p.x = Math.random()*W; p.y = H+80; }
else { p.x = -80; p.y = Math.random()*H; }
var inward = Math.atan2(H/2 - p.y, W/2 - p.x);
var cos = Math.cos(inward), sin = Math.sin(inward);
for (var i = 0; i < offsets.length; i++) {
if (enemies.length >= MAX_ENEMIES) break;
var off = offsets[i];
var rx = off.dx*cos - off.dy*sin;
var ry = off.dx*sin + off.dy*cos;
enemies.push(makeEnemy(p.x+rx, p.y+ry));
}
}
function spawnBoss() {
if (bossActive) return;
var totalHp = 20 + (Math.floor(level/5)-1)*10;
boss = {
x:W/2, y:-80, r:52, vx:0, vy:0.6,
angle:0, rotSpeed:0.008,
hp:totalHp, maxHp:totalHp,
flashTimer:0, drones:[], projectiles:[],
shootTimer:0, entryDone:false, speed:0.9
};
for (var i = 0; i < 4; i++) {
boss.drones.push({ angle:(i/4)*Math.PI*2, r:18, alive:true });
}
bossActive = true; bossAnnounceTimer = 180;
asteroids = []; enemies = [];
}
function getBossPhase(b) {
var p = b.hp / b.maxHp;
if (p > 0.75) return 4;
if (p > 0.5) return 3;
if (p > 0.25) return 2;
return 1;
}
var BOSS_COLS = ['','#ffee44','#ff7700','#ff1e3c','#cc44ff'];
var BOSS_FILLS = ['','rgba(120,100,0,0.75)','rgba(140,50,0,0.75)','rgba(120,0,30,0.75)','rgba(80,0,140,0.75)'];
var BOSS_RGB = ['','255,238,68','255,119,0','255,30,60','204,68,255'];
function drawStars() {
var i, s;
for (i = 0; i < stars.length; i++) {
s = stars[i];
ctx.beginPath();
ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
ctx.fillStyle = 'rgba(255,255,255,' + s.bright + ')';
ctx.fill();
}
}
function drawPlayer() {
if (player.invincible > 0 && Math.floor(frameCount/4) % 2 === 0) return;
var i, t, a;
for (i = 0; i < player.trail.length; i++) {
t = player.trail[i];
a = (i / player.trail.length) * 0.4;
ctx.beginPath();
ctx.arc(t.x, t.y, player.r * 0.4 * (i/player.trail.length), 0, Math.PI*2);
ctx.fillStyle = 'rgba(0,243,255,' + a + ')';
ctx.fill();
}
ctx.save();
ctx.translate(player.x, player.y);
ctx.rotate(player.angle);
ctx.beginPath();
ctx.moveTo(player.r, 0);
ctx.lineTo(-player.r*0.6, -player.r*0.7);
ctx.lineTo(-player.r*0.3, 0);
ctx.lineTo(-player.r*0.6, player.r*0.7);
ctx.closePath();
ctx.strokeStyle = '#00f3ff';
ctx.lineWidth = 2;
ctx.shadowColor = '#00f3ff';
ctx.shadowBlur = 15;
ctx.stroke();
ctx.fillStyle = 'rgba(0,243,255,0.15)';
ctx.fill();
var fl = 8 + Math.sin(frameCount*0.3)*5;
ctx.beginPath();
ctx.moveTo(-player.r*0.3, -5);
ctx.lineTo(-player.r*0.3-fl, 0);
ctx.lineTo(-player.r*0.3, 5);
ctx.strokeStyle = '#ff6600';
ctx.shadowColor = '#ff6600';
ctx.shadowBlur = 18;
ctx.lineWidth = 2;
ctx.stroke();
if (tripleShot) {
ctx.shadowColor = '#cc44ff';
ctx.shadowBlur = 10;
ctx.strokeStyle = '#cc44ff';
var boffs = [-0.44, 0.44];
for (i = 0; i < 2; i++) {

function rebuildOrbs() {
var cfg = ORB_CONFIG[upgrades.orbLevel];

var newOrbs = [];
for (var i = 0; i < cfg.count; i++) {
var existing = player.orbs[i];
newOrbs.push({
angle: existing ? existing.angle : (i / cfg.count) * Math.PI * 2,
alive: existing ? existing.alive : true,
respawnTimer: existing ? existing.respawnTimer : 0
});
}
player.orbs = newOrbs;
}

];
var best = corners[0], bd = 0;
for (var i = 0; i < corners.length; i++) {
var cdx = corners[i].x - deathX, cdy = corners[i].y - deathY;
var d = Math.sqrt(cdx*cdx + cdy*cdy);
if (d > bd) { bd = d; best = corners[i]; }
}
player.x = best.x; player.y = best.y;
player.vx = 0; player.vy = 0; player.trail = [];
}
function playerDie() {
var dx = player.x, dy = player.y;
explode(dx, dy, '#00f3ff', 40, 4);
explode(dx, dy, '#ff2d78', 20, 6);
lives--; combo = 0; updateHUD();
if (lives <= 0) { gameOver(); return; }
player.invincible = 180;
respawnPlayer(dx, dy);
}
function gameOver() {
state = 'dead';
if (score > hiScore) hiScore = score;
var ov = document.getElementById('overlay');
ov.style.display = 'flex';
document.querySelector('#overlay h1').textContent = 'GAME OVER';
document.getElementById('start-btn').textContent = 'RETRY';
var fs = document.getElementById('final-score');
fs.style.display = 'block';
fs.textContent = 'SCORE: ' + score.toLocaleString();
var hs = document.getElementById('hi-score');
hs.style.display = 'block';
hs.textContent = 'BEST: ' + hiScore.toLocaleString();
}
function updateHUD() {
document.getElementById('s-score').textContent = score.toLocaleString();
document.getElementById('s-level').textContent = level;
var d = document.getElementById('lives-display');
while (d.firstChild) d.removeChild(d.firstChild);
var cap = maxLivesCap();
for (var i = 0; i < cap; i++) {
var h = document.createElement('div');
h.className = i < lives ? 'heart' : 'heart lost';
d.appendChild(h);
}
if (state === 'shop') {
document.getElementById('shop-score-val').textContent = score.toLocaleString();
}
}
function flashLevel() {
var el = document.getElementById('lvlflash');
document.getElementById('lvlflash-txt').textContent = 'LEVEL ' + level;
el.style.opacity = '1';
el.style.transition = 'none';
setTimeout(function(){ el.style.transition = 'opacity 0.8s'; el.style.opacity = '0'; }, 600);
}
function update() {
if (state !== 'playing') return;
frameCount++;
var shipMaxSpd = 7;
var sd = Math.sqrt(stick.dx*stick.dx + stick.dy*stick.dy);
if (sd > STICK_DEAD) {
var norm = sd / STICK_R;
player.vx += (stick.dx/sd) * norm * 0.9;
player.vy += (stick.dy/sd) * norm * 0.9;
player.angle = Math.atan2(stick.dy, stick.dx);
}
player.vx *= 0.88; player.vy *= 0.88;
var ps = Math.sqrt(player.vx*player.vx + player.vy*player.vy);
if (ps > shipMaxSpd) { player.vx = player.vx/ps*shipMaxSpd; player.vy = player.vy/ps*shipMaxSpd; }
player.x += player.vx; player.y += player.vy;
var wall = player.r;
if (player.x < wall)  { player.x = wall;  player.vx = Math.abs(player.vx) * 0.4; }
if (player.x > W-wall){ player.x = W-wall; player.vx = -Math.abs(player.vx) * 0.4; }
if (player.y < wall)  { player.y = wall;  player.vy = Math.abs(player.vy) * 0.4; }
if (player.y > H-wall){ player.y = H-wall; player.vy = -Math.abs(player.vy) * 0.4; }
player.trail.push({x:player.x, y:player.y});
if (player.trail.length > 18) player.trail.shift();
if (player.shootCd > 0) player.shootCd--;
if (player.shootCd === 0) shoot();
if (tripleShot) {
if (player.sideCd > 0) player.sideCd--;
if (player.sideCd === 0) shootSide();
}
if (player.invincible > 0) player.invincible--;
if (rapidFire) { rapidTimer--; if (rapidTimer <= 0) rapidFire = false; }
if (tripleShot) { tripleShotTimer--; if (tripleShotTimer <= 0) tripleShot = false; }
var i, b;
for (i = bullets.length-1; i >= 0; i--) {
b = bullets[i]; b.x += b.vx; b.y += b.vy;
if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) bullets.splice(i,1);
}
var oi, orb, orbX, orbY, cfg2;
if (upgrades.orbLevel > 0) {
cfg2 = ORB_CONFIG[upgrades.orbLevel];
player.orbAngle += cfg2.speed;
for (oi = 0; oi < player.orbs.length; oi++) {
orb = player.orbs[oi];
orb.angle = player.orbAngle + (oi / player.orbs.length) * Math.PI * 2;
if (!orb.alive) {
orb.respawnTimer--;
if (orb.respawnTimer <= 0) orb.alive = true;
continue;
}
orbX = player.x + Math.cos(orb.angle) * cfg2.radius;
orbY = player.y + Math.sin(orb.angle) * cfg2.radius;
var orbHit = false;
for (var ea = asteroids.length-1; ea >= 0; ea--) {
if (dist({x:orbX,y:orbY}, asteroids[ea]) < 10 + asteroids[ea].r * 0.5) {
asteroids[ea].hp--;
explode(orbX, orbY, '#ffaa00', 8, 3);
if (asteroids[ea].hp <= 0) {
var ah2 = asteroids[ea].hue||280;
explode(asteroids[ea].x,asteroids[ea].y,'hsl('+ah2+',90%,65%)',12,3);
combo++; comboTimer = 120;
var op = Math.floor(asteroids[ea].r * (1+combo*0.1)) * level;
score += op; scoreText(asteroids[ea].x, asteroids[ea].y-20, '+'+op);
if (asteroids[ea].tier===2) { asteroids.push(makeChildAsteroid(asteroids[ea],asteroids[ea].r*0.5,1)); asteroids.push(makeChildAsteroid(asteroids[ea],asteroids[ea].r*0.5,1)); }
else if (asteroids[ea].tier===1||asteroids[ea].r>22) { asteroids.push(makeChildAsteroid(asteroids[ea],asteroids[ea].r*0.5,0)); asteroids.push(makeChildAsteroid(asteroids[ea],asteroids[ea].r*0.5,0)); }
asteroids.splice(ea,1); updateHUD();
}
orb.alive = false; orb.respawnTimer = cfg2.respawn;
orbHit = true; break;
}
}
if (!orbHit) {
for (var ee = enemies.length-1; ee >= 0; ee--) {
if (dist({x:orbX,y:orbY}, enemies[ee]) < 10 + enemies[ee].r * 0.6) {
enemies[ee].hp--;
explode(orbX, orbY, '#ffaa00', 8, 3);
if (enemies[ee].hp <= 0) {
explode(enemies[ee].x,enemies[ee].y,'#ff1e3c',20,4);
combo++; comboTimer=120;
var ep2=Math.floor(80*level*(1+combo*0.1));
score+=ep2; scoreText(enemies[ee].x,enemies[ee].y-20,'+'+ep2);
enemies.splice(ee,1); updateHUD();
}
orb.alive = false; orb.respawnTimer = cfg2.respawn;
break;
}
}
}
}
}
if (!bossActive && Math.random() < 1/asteroidSpawnRate) spawnAsteroid();
if (frameCount % Math.max(280, 480-level*20) === 0) spawnPowerup();
var fRate = Math.max(300, 1200 - level*80);
if (!bossActive && level >= 2 && frameCount > 300 && frameCount % fRate < 2) spawnFormation();
if (frameCount % 1200 === 0) {
level++;
var capLevel = Math.min(level, 6);
asteroidSpawnRate = Math.max(37, 90 - (capLevel-1)*8);
asteroidSpeedMult = Math.min(1.9, 1 + (capLevel-1)*0.18);
asteroidHpBonus = Math.min(3, Math.max(0, Math.floor((level-5)/2)));
updateHUD();
var isBossLevel = level >= 5 && level % 5 === 0;
if (!isBossLevel) flashLevel();
if (isBossLevel) spawnBoss();
}
var e, tdx, tdy, td, es, j, hit;
for (i = enemies.length-1; i >= 0; i--) {
e = enemies[i];
tdx = player.x-e.x; tdy = player.y-e.y;
td = Math.sqrt(tdx*tdx+tdy*tdy) || 1;
e.vx += (tdx/td)*0.12; e.vy += (tdy/td)*0.12;
es = Math.sqrt(e.vx*e.vx+e.vy*e.vy) || 1;
if (es > e.speed) { e.vx = e.vx/es*e.speed; e.vy = e.vy/es*e.speed; }
e.x += e.vx; e.y += e.vy;
e.angle = Math.atan2(e.vy, e.vx);
if (e.flashTimer > 0) e.flashTimer--;
hit = false;
for (j = bullets.length-1; j >= 0; j--) {
if (dist(bullets[j], e) < e.r+6) { bullets.splice(j,1); e.hp--; e.flashTimer=10; hit=true; break; }
}
if (e.hp <= 0) {
explode(e.x,e.y,'#ff1e3c',30,4); explode(e.x,e.y,'#ff8800',15,6); explode(e.x,e.y,'#fff',8,7);
combo++; comboTimer=120;
var ep = Math.floor(80*level*(1+combo*0.1));
score += ep; scoreText(e.x, e.y-20, '+'+ep);
enemies.splice(i,1); updateHUD(); continue;
}
if (player.invincible<=0 && dist(player,e)<player.r+e.r*0.85) { combo=0; playerDie(); }
}
if (bossAnnounceTimer > 0) bossAnnounceTimer--;
if (bossShake > 0) bossShake--;
if (boss) {
var bos = boss, phase = getBossPhase(bos);
bos.angle += bos.rotSpeed;
if (!bos.entryDone) {
bos.y += 1.8;
if (bos.y >= H*0.22) { bos.y = H*0.22; bos.entryDone = true; }
} else {
tdx = player.x-bos.x; tdy = player.y-bos.y;
td = Math.sqrt(tdx*tdx+tdy*tdy) || 1;
var chase = phase <= 2 ? 0.018 : 0.008;
bos.vx += (tdx/td)*chase; bos.vy += (tdy/td)*chase;
if (phase === 1) bos.vx += Math.sin(frameCount*0.04)*0.04;
var bs = Math.sqrt(bos.vx*bos.vx+bos.vy*bos.vy) || 1;
if (bs > bos.speed) { bos.vx=bos.vx/bs*bos.speed; bos.vy=bos.vy/bs*bos.speed; }
bos.x += bos.vx; bos.y += bos.vy;
bos.x = Math.max(bos.r+10, Math.min(W-bos.r-10, bos.x));
bos.y = Math.max(bos.r+10, Math.min(H*0.6, bos.y));
}
var dspd = 0.018 + (4-phase)*0.006;
for (i = 0; i < bos.drones.length; i++) bos.drones[i].angle += dspd;
bos.shootTimer--;
if (bos.shootTimer <= 0 && bos.entryDone) {
var rates = [0,35,55,75,100];
var counts = [0,6,4,3,2];
var spds = [0,1.8,2.2,2.6,3.0];
bos.shootTimer = rates[phase];
for (i = 0; i < counts[phase]; i++) {
var ba = (i/counts[phase])*Math.PI*2 + bos.angle;
bos.projectiles.push({x:bos.x,y:bos.y,vx:Math.cos(ba)*spds[phase],vy:Math.sin(ba)*spds[phase]});
}
if (phase <= 2) {
var pa = Math.atan2(player.y-bos.y, player.x-bos.x);
bos.projectiles.push({x:bos.x,y:bos.y,vx:Math.cos(pa)*2.4,vy:Math.sin(pa)*2.4});
}
}
for (i = bos.projectiles.length-1; i >= 0; i--) {
var pr = bos.projectiles[i]; pr.x+=pr.vx; pr.y+=pr.vy;
if (pr.x<-30||pr.x>W+30||pr.y<-30||pr.y>H+30) { bos.projectiles.splice(i,1); continue; }
if (player.invincible<=0 && dist(player,pr)<player.r+10) { bos.projectiles.splice(i,1); combo=0; playerDie(); }
}
if (bos.flashTimer > 0) bos.flashTimer--;
var dr, drX, drY;
for (i = 0; i < bos.drones.length; i++) {
dr = bos.drones[i];
if (!dr.alive) continue;
drX = bos.x+Math.cos(dr.angle)*bos.r*1.7; drY = bos.y+Math.sin(dr.angle)*bos.r*1.7;
for (j = bullets.length-1; j >= 0; j--) {
if (dist(bullets[j],{x:drX,y:drY})<dr.r+5) { bullets.splice(j,1); dr.alive=false; explode(drX,drY,'#00f3ff',14,3); break; }
}
if (player.invincible<=0 && dist(player,{x:drX,y:drY})<player.r+dr.r) { combo=0; playerDie(); }
}
var dronesLeft = 0;
for (i = 0; i < bos.drones.length; i++) if (bos.drones[i].alive) dronesLeft++;
if (dronesLeft === 0) {
for (j = bullets.length-1; j >= 0; j--) {
if (dist(bullets[j], bos) < bos.r+5) {
bullets.splice(j,1); bos.hp--; bos.flashTimer=8; bossShake=6;
if (bos.hp <= 0) {
for (var k = 0; k < 5; k++) {
(function(kk){
setTimeout(function(){
if (!boss) return;
explode(bos.x+(Math.random()-0.5)*80,bos.y+(Math.random()-0.5)*80,'#cc44ff',25,5);
explode(bos.x+(Math.random()-0.5)*60,bos.y+(Math.random()-0.5)*60,'#ff7700',20,4);
}, kk*100);
})(k);
}
explode(bos.x,bos.y,'#fff',60,8);
var bpts = 500*level; score+=bpts; scoreText(bos.x,bos.y-60,'+'+bpts+' BOSS!');
updateHUD(); boss=null; bossActive=false;
setTimeout(openShop, 800);
} else {
var newPhase = getBossPhase(bos);
if (newPhase < phase) { for (i=0;i<bos.drones.length;i++) bos.drones[i].alive=true; explode(bos.x,bos.y,'#cc44ff',30,4); }
}
break;
}
}
}
if (boss && player.invincible<=0 && dist(player,bos)<player.r+bos.r*0.75) { combo=0; playerDie(); }
}
var a, ahit;
for (i = asteroids.length-1; i >= 0; i--) {
a = asteroids[i]; a.x+=a.vx; a.y+=a.vy; a.rot+=a.spin;
var m = a.r+2;
if (a.x < -m) a.x = W+m; if (a.x > W+m) a.x = -m;
if (a.y < -m) a.y = H+m; if (a.y > H+m) a.y = -m;
ahit = false;
for (j = bullets.length-1; j >= 0; j--) {
if (dist(bullets[j],a) < a.r+5) { bullets.splice(j,1); a.hp--; ahit=true; explode(a.x,a.y,'#fff',4,2); break; }
}
if (ahit && a.hp > 0) continue;
if (ahit && a.hp <= 0) {
var ah = a.hue||280;
explode(a.x,a.y,'hsl('+ah+',90%,65%)',16+Math.floor(a.r),3); explode(a.x,a.y,'#fff',6,5);
combo++; comboTimer=120;
var ap = Math.floor(a.r*(1+combo*0.1))*level; score+=ap; scoreText(a.x,a.y-20,'+'+ap);
if (a.tier===2) { asteroids.push(makeChildAsteroid(a,a.r*0.5,1)); asteroids.push(makeChildAsteroid(a,a.r*0.5,1)); }
else if (a.tier===1||a.r>22) { asteroids.push(makeChildAsteroid(a,a.r*0.5,0)); asteroids.push(makeChildAsteroid(a,a.r*0.5,0)); }
asteroids.splice(i,1); updateHUD(); continue;
}
if (player.invincible<=0 && dist(player,a)<player.r+a.r*0.7) { combo=0; playerDie(); }
}
var pu;
for (i = powerups.length-1; i >= 0; i--) {
pu = powerups[i]; pu.y += pu.vy;
if (pu.y > H+30) { powerups.splice(i,1); continue; }
if (dist(player,pu) < player.r+pu.r+5) {
var gc = pu.type==='shield'?'#00f3ff':pu.type==='rapid'?'#ffdd00':'#cc44ff';
explode(pu.x,pu.y,gc,20,3);
if (pu.type==='shield') player.invincible = 300;
else if (pu.type==='rapid') { rapidFire=true; rapidTimer=400; }
else { tripleShot=true; tripleShotTimer=500; }
powerups.splice(i,1);
}
}
var par;
for (i = particles.length-1; i >= 0; i--) {
par = particles[i]; par.life -= par.decay;
if (par.scoreText) { par.y += par.vy; }
else { par.x+=par.vx; par.y+=par.vy; par.vx*=0.95; par.vy*=0.95; }
if (par.life <= 0) particles.splice(i,1);
}
if (comboTimer > 0) {
comboTimer--;
var cel = document.getElementById('combo');
document.getElementById('combo-num').textContent = combo;
cel.className = combo >= 3 ? 'show' : '';
if (comboTimer === 0) { combo=0; cel.className=''; }
}
for (i = 0; i < stars.length; i++) {
stars[i].y += stars[i].speed;
if (stars[i].y > H) { stars[i].y = 0; stars[i].x = Math.random()*W; }
}
}
function draw() {
ctx.fillStyle = '#000814';
ctx.fillRect(0, 0, W, H);
drawStars();
if (state === 'playing' || state === 'shop') {
if (bossShake > 0) {
ctx.save();
ctx.translate((Math.random()-0.5)*bossShake*2, (Math.random()-0.5)*bossShake*2);
}
var i;
for (i=0;i<asteroids.length;i++) drawAsteroid(asteroids[i]);
for (i=0;i<enemies.length;i++) drawEnemy(enemies[i]);
if (boss) drawBoss(boss);
for (i=0;i<bullets.length;i++) drawBullet(bullets[i]);
for (i=0;i<powerups.length;i++) drawPowerup(powerups[i]);
drawParticles();
drawPlayer();
if (bossShake > 0) ctx.restore();
if (boss) drawBossHud(boss);
drawBossAnnounce();
drawInventory();
drawActiveBuffs();
drawStick();
} else if (state === 'dead') {
drawParticles();
}
}
function loop() {
update();
draw();
requestAnimationFrame(loop);
}
initStars();
updateHUD();
loop();</script>
